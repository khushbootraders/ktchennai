<div class="contact-container">

    <div class="contact-card">

        <h2>Enquiry Form</h2>

        <form action="https://formsubmit.co/khushbootraders3648@gmail.com"
              method="POST">

            <input type="text"
                   name="Name"
                   placeholder="Your Name"
                   required>

            <br><br>

            <input type="tel"
                   name="Mobile"
                   placeholder="Mobile Number"
                   required>

            <br><br>

            <input type="text"
                   name="Product"
                   placeholder="Product Name"
                   required>

            <br><br>

            <input type="text"
                   name="Quantity"
                   placeholder="Required Quantity">

            <br><br>

            <textarea name="Message"
                      rows="5"
                      placeholder="Your Message"></textarea>

            <br><br>

            <button type="submit" class="btn">
                Send Enquiry
            </button>

        </form>
